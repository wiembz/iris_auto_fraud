<div class="public-shell">
  <header class="public-nav" [class.public-nav--open]="isMenuOpen">
    <a class="brand" routerLink="/" aria-label="Accueil IRIS" (click)="closeMenu()">
      <iris-logo [size]="30" />
      <span class="brand-word">IRIS</span>
    </a>

    <span class="nav-separator" aria-hidden="true"></span>

    <button type="button" class="menu-toggle" [attr.aria-expanded]="isMenuOpen" aria-label="Ouvrir la navigation" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>

    <nav aria-label="Navigation de présentation IRIS">
      @for (item of navLinks; track item.fragment) {
        <a routerLink="/" [fragment]="item.fragment" (click)="closeMenu()">{{ item.label }}</a>
      }
    </nav>

    <div class="nav-actions">
      <span class="version">Sinistres automobiles intelligents</span>
      <button type="button" class="theme-toggle" (click)="toggleTheme()">
        {{ theme === 'light' ? 'Dark' : 'Light' }}
      </button>
      <a class="iris-button iris-button--primary" routerLink="/login" (click)="closeMenu()">Se connecter</a>
    </div>
  </header>

  <router-outlet />
</div>
